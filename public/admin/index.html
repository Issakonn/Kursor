<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><title>Админ — КУРСОР</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/uploads/mascot/happy.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo">
      <img src="https://salamalekum.sirv.com/_1_1.png.webp" alt="">
      <span>КУРСОР Админ</span>
    </div>
    <a href="#" class="active" data-tab="dashboard">Обзор</a>
    <a href="#" data-tab="users">Ученики/Учителя</a>
    <a href="#" data-tab="modules">Модули и темы</a>
    <a href="#" data-tab="tasks">Задачи</a>
    <div style="border-top:1px solid rgba(255,255,255,0.15);margin:12px 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.4);padding-top:10px">Фаза 1</div>
    <a href="#" data-tab="materials">Материалы курсов</a>
    <a href="#" data-tab="feedback">Отзывы</a>
    <a href="#" data-tab="exportimport">Импорт / Экспорт</a>
    <div style="border-top:1px solid rgba(255,255,255,0.15);margin:12px 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.4);padding-top:10px">Фаза 2 — CRM</div>
    <a href="#" data-tab="branches">Филиалы</a>
    <a href="#" data-tab="tariffs">Тарифы</a>
    <a href="#" data-tab="groups">Группы</a>
    <a href="#" data-tab="clients">Клиенты</a>
    <a href="#" data-tab="teacherperms">Права учителей</a>
    <a href="#" onclick="logout();return false;" style="margin-top:30px;color:#ef4444">Выйти</a>
  </aside>
  <main class="admin-main">
    <div id="tab">Загружаем…</div>
  </main>
</div>

<div id="modal" class="modal-overlay"><div class="modal" id="modalContent"></div></div>

<script src="/data/database.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
const user = requireAuth(['admin','teacher']);
let currentTab = 'dashboard';
let cache = { users: [], modules: [], tasks: [], progressById: {} };
let _renderToken = 0;

document.querySelectorAll('.admin-sidebar a[data-tab]').forEach(a => {
  a.onclick = e => {
    e.preventDefault();
    document.querySelectorAll('.admin-sidebar a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentTab = a.dataset.tab;
    render();
  };
});

if (user) render();

function _withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('Тайм-аут запроса: ' + label)), ms))
  ]);
}

async function loadAll() {
  const [users, modules, tasks] = await _withTimeout(Promise.all([
    API.getUsers(true), API.getModules(true), API.getTasks(true),
  ]), 15000, 'users/modules/tasks');
  cache.users = users || [];
  cache.modules = modules || [];
  cache.tasks = tasks || [];
  try {
    const allProgress = await _withTimeout(API.getAllProgress(), 15000, 'progress');
    cache.progressById = Object.fromEntries((allProgress || []).map(p => [p.userId, p]));
  } catch (e) { console.warn('progress load failed:', e.message); cache.progressById = {}; }
}

async function render() {
  const myToken = ++_renderToken;
  document.getElementById('tab').innerHTML = 'Загружаем…';
  try { await loadAll(); }
  catch (e) {
    if (myToken !== _renderToken) return;
    document.getElementById('tab').innerHTML = `<div class="card" style="padding:30px;color:#ef4444">Ошибка загрузки: ${escapeHtml(e.message)}<br><br><button class="btn" onclick="render()">Повторить</button></div>`;
    return;
  }
  if (myToken !== _renderToken) return;  // пользователь уже переключил вкладку
  try {
    switch (currentTab) {
      case 'dashboard': renderDashboard(); break;
      case 'users': renderUsers(); break;
      case 'modules': renderModules(); break;
      case 'tasks': renderTasks(); break;
      case 'materials': renderMaterials(); break;
      case 'feedback': renderFeedbackTab(); break;
      case 'exportimport': renderExportImport(); break;
      case 'branches':     renderBranches(); break;
      case 'tariffs':      renderTariffs(); break;
      case 'groups':       renderGroups(); break;
      case 'clients':      renderClients(); break;
      case 'teacherperms': renderTeacherPerms(); break;
    }
  } catch (e) {
    document.getElementById('tab').innerHTML = `<div class="card" style="padding:30px;color:#ef4444">Ошибка отрисовки "${currentTab}": ${escapeHtml(e.message)}</div>`;
    console.error(e);
  }
}

function renderDashboard() {
  const students = cache.users.filter(u => u.role === 'student');
  const totalCompleted = students.reduce((sum, s) => {
    const p = cache.progressById[s.id];
    return sum + (p ? Object.values(p.tasks).filter(t=>t.status==='done').length : 0);
  }, 0);
  const totalPoints = students.reduce((sum, s) => sum + (cache.progressById[s.id]?.points || 0), 0);

  document.getElementById('tab').innerHTML = `
    <h1>Обзор платформы</h1>
    <p style="color:#64748b;margin-top:6px">Привет, <b>${escapeHtml(user.name)}</b>! Роль: <span class="badge badge-${user.role==='admin'?'danger':'warning'}">${user.role}</span></p>
    <div class="stats-grid" style="margin-top:20px">
      <div class="stat-card"><div class="stat-icon blue"><img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png" style="width:22px;height:22px"></div><div><div class="stat-value">${students.length}</div><div class="stat-label">Учеников</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" style="width:22px;height:22px"></div><div><div class="stat-value">${cache.modules.length}</div><div class="stat-label">Модулей</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><img src="https://cdn-icons-png.flaticon.com/512/3143/3143190.png" style="width:22px;height:22px"></div><div><div class="stat-value">${cache.tasks.length}</div><div class="stat-label">Задач</div></div></div>
      <div class="stat-card"><div class="stat-icon orange"><img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px"></div><div><div class="stat-value">${totalCompleted}</div><div class="stat-label">Решено всеми</div></div></div>
      <div class="stat-card"><div class="stat-icon pink"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" style="width:22px;height:22px"></div><div><div class="stat-value">${totalPoints}</div><div class="stat-label">Очков всего</div></div></div>
    </div>

    <h2 class="section-title" style="margin-top:30px">Быстрые действия</h2>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      ${user.role === 'admin' ? `<button class="btn btn-lg" onclick="switchTab('users');setTimeout(openUserForm,100)">Добавить аккаунт</button>` : ''}
      <button class="btn btn-lg btn-secondary" onclick="switchTab('tasks');setTimeout(openTaskForm,100)">Добавить задачу</button>
      <button class="btn btn-lg btn-success" onclick="switchTab('modules');setTimeout(openModuleForm,100)">Добавить модуль</button>
    </div>
  `;
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.admin-sidebar a').forEach(x => x.classList.remove('active'));
  document.querySelector(`[data-tab="${t}"]`).classList.add('active');
  render();
}

function renderUsers() {
  if (user.role !== 'admin') {
    document.getElementById('tab').innerHTML = `
      <h1>Пользователи</h1>
      <div class="card" style="padding:24px;margin-top:14px">
        <p>Только администратор может создавать и редактировать аккаунты.</p>
      </div>`;
    return;
  }
  document.getElementById('tab').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1>Пользователи</h1>
      <button class="btn" onclick="openUserForm()">Создать аккаунт</button>
    </div>
    <p style="color:#64748b;margin-bottom:14px">Пароли хранятся на сервере в виде bcrypt-хешей и не показываются.</p>
    <table class="table">
      <thead><tr><th>Имя</th><th>Логин</th><th>Роль</th><th>Возраст</th><th>Группа</th><th>Языки</th><th>Действия</th></tr></thead>
      <tbody>
        ${cache.users.map(u => `
          <tr>
            <td><b>${escapeHtml(u.name)}</b></td>
            <td><code>${escapeHtml(u.login)}</code></td>
            <td><span class="badge badge-${u.role==='admin'?'danger':u.role==='teacher'?'warning':'info'}">${u.role}</span></td>
            <td>${u.age || '—'}</td>
            <td>${KURSOR_DB.GROUPS[u.group]?.name || '—'}</td>
            <td>${(u.languages||[]).map(l=>KURSOR_DB.LANGS[l]?.icon ? `<img src="${KURSOR_DB.LANGS[l].icon}" style="width:18px;height:18px;object-fit:contain;vertical-align:-3px;margin-right:2px">` : '').join('') || '—'}</td>
            <td>
              <button class="btn btn-ghost" title="Редактировать" onclick="openUserForm('${u.id}')"><img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" style="width:18px;height:18px;vertical-align:-3px"></button>
              ${u.id !== user.id ? `<button class="btn btn-ghost" title="Удалить" style="color:#ef4444" onclick="removeUser('${u.id}')"><img src="https://cdn-icons-png.flaticon.com/512/3221/3221897.png" style="width:18px;height:18px;vertical-align:-3px"></button>` : ''}
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function openUserForm(id) {
  const u = id ? cache.users.find(x => x.id === id) : { role:'student', age:10, group:2, languages:[] };
  const langs = Object.entries(KURSOR_DB.LANGS);
  document.getElementById('modalContent').innerHTML = `
    <h2>${id ? '️ Редактировать' : 'Создать'} пользователя</h2>
    <div class="form-group"><label>Имя</label><input class="form-input" id="f_name" value="${escapeHtml(u.name||'')}" placeholder="Алия Серикова"></div>
    <div class="form-group"><label>Логин</label><input class="form-input" id="f_login" value="${escapeHtml(u.login||'')}" placeholder="aliya"></div>
    <div class="form-group">
      <label>Пароль ${id ? '<small style="color:#64748b">(оставь пустым, чтобы не менять)</small>' : ''}</label>
      <input class="form-input" id="f_password" type="text" value="" placeholder="${id ? 'не менять' : 'минимум 4 символа'}">
    </div>
    <div class="form-group"><label>Роль</label>
      <select class="form-input" id="f_role">
        <option value="student" ${u.role==='student'?'selected':''}>Ученик</option>
        <option value="teacher" ${u.role==='teacher'?'selected':''}>Учитель</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>Администратор</option>
      </select>
    </div>
    <div class="form-group" id="studentFields">
      <label>Возраст</label><input class="form-input" id="f_age" type="number" value="${u.age||10}" min="6" max="18">
      <label style="margin-top:10px">Группа</label>
      <select class="form-input" id="f_group">
        <option value="1" ${u.group==1?'selected':''}>Группа 1 (6–8 лет)</option>
        <option value="2" ${u.group==2?'selected':''}>Группа 2 (9–11 лет)</option>
        <option value="3" ${u.group==3?'selected':''}>Группа 3 (12–16 лет)</option>
      </select>
      <label style="margin-top:10px">Языки / технологии:</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        ${langs.map(([k,l]) => `
          <label class="filter-chip" style="cursor:pointer;display:flex;align-items:center;gap:6px">
            <input type="checkbox" class="f_lang" value="${k}" ${(u.languages||[]).includes(k)?'checked':''}>
            ${l.icon ? `<img src="${l.icon}" style="width:14px;height:14px;object-fit:contain;vertical-align:-2px">` : ''} ${l.name}
          </label>`).join('')}
      </div>
      <label style="margin-top:10px">Прикреплённый учитель (опционально)</label>
      <select class="form-input" id="f_teacher">
        <option value="">— не назначен —</option>
        ${cache.users.filter(x => x.role === 'teacher').map(t =>
          `<option value="${t.id}" ${u.teacher_id===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('')}
      </select>
    </div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;margin-top:8px;min-height:18px"></div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-success" onclick="saveUser('${id||''}')">Сохранить</button>
    </div>
  `;
  document.getElementById('modal').classList.add('active');
}

async function saveUser(id) {
  const langs = Array.from(document.querySelectorAll('.f_lang:checked')).map(c => c.value);
  const data = {
    name: document.getElementById('f_name').value.trim(),
    login: document.getElementById('f_login').value.trim(),
    role: document.getElementById('f_role').value,
    age: parseInt(document.getElementById('f_age').value) || 0,
    group: parseInt(document.getElementById('f_group').value) || 0,
    languages: langs,
    teacher_id: document.getElementById('f_teacher').value || null,
  };
  const pwd = document.getElementById('f_password').value;
  if (pwd) data.password = pwd;
  const err = document.getElementById('modalErr');
  err.textContent = '';
  if (!data.name || !data.login) { err.textContent = 'Введи имя и логин'; return; }
  if (!id && !pwd) { err.textContent = 'Пароль обязателен при создании'; return; }
  try {
    if (id) await API.updateUser(id, data);
    else await API.createUser(data);
    closeModal();
    await render();
    showToast('<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px"> Сохранено','success');
  } catch (e) { err.textContent = e.message; }
}

async function removeUser(id) {
  if (!confirm('Удалить пользователя? Прогресс ученика тоже удалится.')) return;
  try { await API.deleteUser(id); await render(); showToast('Удалено','success'); }
  catch (e) { alert(e.message); }
}

function renderModules() {
  document.getElementById('tab').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1>Модули и темы</h1>
      <button class="btn" onclick="openModuleForm()">Добавить модуль</button>
    </div>
    <table class="table">
      <thead><tr><th>ID</th><th>Язык</th><th>Название</th><th>Видео</th><th>Действия</th></tr></thead>
      <tbody>
        ${cache.modules.map(m => {
          const lang = KURSOR_DB.LANGS[m.lang];
          return `
            <tr>
              <td><code>${escapeHtml(m.id)}</code></td>
              <td>${lang ? `<span class="lang-badge ${lang.class}">${lang.icon ? `<img src="${lang.icon}" style="width:14px;height:14px;object-fit:contain;vertical-align:-2px">` : ''} ${lang.name}</span>` : m.lang}</td>
              <td><b>${escapeHtml(m.title)}</b><div style="font-size:12px;color:#64748b">${escapeHtml((m.description||'').slice(0,80))}</div></td>
              <td>${m.video ? '<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px">' : '—'}</td>
              <td>
                <button class="btn btn-ghost" title="Редактировать" onclick="openModuleForm('${m.id}')"><img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" style="width:18px;height:18px;vertical-align:-3px"></button>
                ${user.role==='admin' ? `<button class="btn btn-ghost" title="Удалить" style="color:#ef4444" onclick="removeModule('${m.id}')"><img src="https://cdn-icons-png.flaticon.com/512/3221/3221897.png" style="width:18px;height:18px;vertical-align:-3px"></button>` : ''}
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function openModuleForm(id) {
  const m = id ? cache.modules.find(x => x.id === id) : { lang:'python', title:'', description:'', video:'', explanation:'' };
  document.getElementById('modalContent').innerHTML = `
    <h2>${id ? '️ Редактировать' : 'Создать'} модуль</h2>
    <div class="form-group"><label>ID (уникальный, латиницей)</label><input class="form-input" id="m_id" value="${escapeHtml(m.id||'')}" ${id?'readonly':''}></div>
    <div class="form-group"><label>Язык / технология</label>
      <select class="form-input" id="m_lang">
        ${Object.entries(KURSOR_DB.LANGS).map(([k,l]) => `<option value="${k}" ${m.lang===k?'selected':''}>${l.icon ? `<img src="${l.icon}" style="width:14px;height:14px;object-fit:contain;vertical-align:-2px">` : ''} ${l.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Название модуля</label><input class="form-input" id="m_title" value="${escapeHtml(m.title||'')}"></div>
    <div class="form-group"><label>Короткое описание</label><textarea class="form-input" id="m_desc" rows="2">${escapeHtml(m.description||'')}</textarea></div>
    <div class="form-group"><label>YouTube (embed-формат)</label><input class="form-input" id="m_video" value="${escapeHtml(m.video||'')}" placeholder="https://www.youtube.com/embed/..."></div>
    <div class="form-group"><label>Объяснение (HTML)</label>
      <textarea class="form-input" id="m_expl" rows="10" style="font-family:Fira Code,monospace;font-size:13px">${escapeHtml(m.explanation||'')}</textarea>
    </div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-success" onclick="saveModule('${id||''}')">Сохранить</button>
    </div>
  `;
  document.getElementById('modal').classList.add('active');
}

async function saveModule(id) {
  const data = {
    id: document.getElementById('m_id').value.trim() || ('mod_'+Date.now()),
    lang: document.getElementById('m_lang').value,
    title: document.getElementById('m_title').value.trim(),
    description: document.getElementById('m_desc').value.trim(),
    video: document.getElementById('m_video').value.trim(),
    explanation: document.getElementById('m_expl').value,
  };
  const err = document.getElementById('modalErr');
  if (!data.title) { err.textContent = 'Введи название'; return; }
  try {
    if (id) await API.updateModule(id, data);
    else await API.createModule(data);
    closeModal(); await render(); showToast('<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px"> Сохранено','success');
  } catch (e) { err.textContent = e.message; }
}

async function removeModule(id) {
  if (!confirm('Удалить модуль? Связанные задачи останутся, но потеряют модуль.')) return;
  try { await API.deleteModule(id); await render(); }
  catch (e) { alert(e.message); }
}

function renderTasks() {
  document.getElementById('tab').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1>Задачи (${cache.tasks.length})</h1>
      <button class="btn" onclick="openTaskForm()">Добавить задачу</button>
    </div>
    <input class="form-input" id="taskSearch" placeholder="Поиск по названию..." style="margin-bottom:14px" oninput="filterTasksTable()">
    <table class="table" id="tasksTable">
      <thead><tr><th>ID</th><th>Тип</th><th>Модуль</th><th>Название</th><th>Сложность</th><th>Действия</th></tr></thead>
      <tbody>
        ${cache.tasks.map(t => {
          const m = cache.modules.find(m => m.id === t.module);
          const lang = m ? KURSOR_DB.LANGS[m.lang] : null;
          const typeLabel = {
            quiz:'📝 Тест', fill:'✏️ Пропуск', order:'🔢 Порядок',
            code:'🐍 Код Python', java:'☕ Код Java', cpp:'⚡ Код C++',
            project:'📁 Проект',
            scratch:'🐱 Интерактив (Scratch)',
            htmlcss:'🌐 Интерактив (HTML)',
            blockly:'🧩 Интерактив (Blockly)'
          };
          return `
            <tr data-search="${escapeHtml((t.title + ' ' + (m?.title||'') + ' ' + (lang?.name||'')).toLowerCase())}">
              <td>${t.id}</td>
              <td>${typeLabel[t.type] || t.type}</td>
              <td>${lang ? `<span class="lang-badge ${lang.class}"><img src="${lang.icon}" style="width:14px;height:14px;object-fit:contain;vertical-align:-2px"></span>` : ''} ${m ? escapeHtml(m.title) : '<span style="color:red">нет модуля</span>'}</td>
              <td><b>${escapeHtml(t.title)}</b></td>
              <td>${'★'.repeat(t.difficulty||1)}</td>
              <td>
                <button class="btn btn-ghost" title="Редактировать" onclick="openTaskForm(${t.id})"><img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" style="width:18px;height:18px;vertical-align:-3px"></button>
                <button class="btn btn-ghost" title="Удалить" style="color:#ef4444" onclick="removeTask(${t.id})"><img src="https://cdn-icons-png.flaticon.com/512/3221/3221897.png" style="width:18px;height:18px;vertical-align:-3px"></button>
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function filterTasksTable() {
  const q = document.getElementById('taskSearch').value.toLowerCase();
  document.querySelectorAll('#tasksTable tbody tr').forEach(tr => {
    tr.style.display = tr.dataset.search.includes(q) ? '' : 'none';
  });
}

function openTaskForm(id) {
  const t = id ? cache.tasks.find(x => x.id === id) : { type:'quiz', difficulty:1, module: cache.modules[0]?.id || '' };
  document.getElementById('modalContent').innerHTML = `
    <h2>${id ? '️ Редактировать' : 'Создать'} задачу</h2>
    <div class="form-group"><label>Модуль</label>
      <select class="form-input" id="t_module">
        ${cache.modules.map(m => {
          const lang = KURSOR_DB.LANGS[m.lang];
          return `<option value="${m.id}" ${t.module===m.id?'selected':''}>${lang?.icon ? `<img src="${lang.icon}" style="width:14px;height:14px;vertical-align:-2px">` : ''} ${escapeHtml(m.title)}</option>`;
        }).join('')}
      </select>
    </div>
    <div class="form-group"><label>Тип задачи</label>
      <select class="form-input" id="t_type" onchange="updateTaskTypeFields()">
        <option value="quiz" ${t.type==='quiz'?'selected':''}>Тест (выбор из 4)</option>
        <option value="fill" ${t.type==='fill'?'selected':''}>Заполни пропуск</option>
        <option value="order" ${t.type==='order'?'selected':''}>Расставь по порядку</option>
        <option value="code" ${t.type==='code'?'selected':''}>Напиши код (Python)</option>
        <option value="java" ${t.type==='java'?'selected':''}>Напиши код (Java) — авто-проверка</option>
        <option value="cpp" ${t.type==='cpp'?'selected':''}>Напиши код (C++) — авто-проверка</option>
        <option value="project" ${t.type==='project'?'selected':''}>Мини-проект</option>
        <option value="scratch" ${t.type==='scratch'?'selected':''}>Интерактивная задача (Scratch / TurboWarp)</option>
        <option value="htmlcss" ${t.type==='htmlcss'?'selected':''}>Интерактивная задача (HTML / CSS)</option>
        <option value="blockly" ${t.type==='blockly'?'selected':''}>Интерактивная задача (Blockly)</option>
      </select>
    </div>
    <div class="form-group"><label>Сложность (1-3)</label><input class="form-input" id="t_diff" type="number" min="1" max="3" value="${t.difficulty||1}"></div>
    <div class="form-group"><label>Название</label><input class="form-input" id="t_title" value="${escapeHtml(t.title||'')}"></div>
    <div class="form-group"><label>Условие задачи</label><textarea class="form-input" id="t_desc" rows="3">${escapeHtml(t.description||'')}</textarea></div>
    <div class="form-group"><label>Подсказка / объяснение</label><textarea class="form-input" id="t_explain" rows="2">${escapeHtml(t.explain||'')}</textarea></div>
    <div id="typeFields"></div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-success" onclick="saveTask(${id||'null'})">Сохранить</button>
    </div>
  `;
  window._editTask = t;
  updateTaskTypeFields();
  document.getElementById('modal').classList.add('active');
}

function updateTaskTypeFields() {
  const type = document.getElementById('t_type').value;
  const t = window._editTask || {};
  let html = '';
  if (type === 'quiz') {
    const opts = t.options || ['','','',''];
    html = `<label>Варианты ответов (4 шт.) — отметь правильный:</label>
      ${[0,1,2,3].map(i => `
        <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
          <input type="radio" name="t_correct" value="${i}" ${t.answer===i?'checked':''} style="width:20px;height:20px">
          <input class="form-input t_option" value="${escapeHtml(opts[i]||'')}" placeholder="Вариант ${String.fromCharCode(65+i)}">
        </div>`).join('')}`;
  } else if (type === 'fill') {
    html = `<label>Правильный ответ (точное слово/число)</label>
      <input class="form-input" id="t_answer" value="${escapeHtml(t.answer||'')}">`;
  } else if (type === 'order') {
    html = `<label>Строки в ПРАВИЛЬНОМ порядке (каждая на новой строке)</label>
      <textarea class="form-input" id="t_items" rows="6" style="font-family:Fira Code,monospace">${escapeHtml((t.items||[]).join('\n'))}</textarea>`;
  } else if (type === 'code') {
    html = `
      <label>Ожидаемый вывод (что должно вывести print)</label>
      <textarea class="form-input" id="t_expected" rows="3" style="font-family:Fira Code,monospace">${escapeHtml(t.expectedOutput||'')}</textarea>
      <label style="margin-top:10px">Стартовый код (необязательно)</label>
      <textarea class="form-input" id="t_starter" rows="4" style="font-family:Fira Code,monospace">${escapeHtml(t.starter||'')}</textarea>`;
  } else if (type === 'project') {
    html = `<p style="color:#64748b;font-size:14px">Для проектов ученик загружает текст/ссылку, учитель проверяет вручную.</p>`;
  } else if (type === 'scratch') {
    html = `
      <label>ID проекта Scratch (необязательно)</label>
      <input class="form-input" id="t_scratch_id" value="${escapeHtml(t.scratchProjectId||'')}" placeholder="Например: 123456789 — оставь пустым для пустого редактора">
      <p style="color:#64748b;font-size:13px;margin-top:6px">Ученик открывает TurboWarp прямо в задаче, делает проект и описывает что сделал. Учитель проверяет вручную.</p>`;
  } else if (type === 'htmlcss') {
    html = `
      <label>Стартовый HTML/CSS код</label>
      <textarea class="form-input" id="t_starter" rows="6" style="font-family:Fira Code,monospace;font-size:13px">${escapeHtml(t.starter||'<!DOCTYPE html>
<html>
<head>
  <style>
    /* твои стили */
  </style>
</head>
<body>
  <h1>Привет!</h1>
</body>
</html>')}</textarea>
      <label style="margin-top:10px">Ожидаемый результат (описание для ученика, необязательно)</label>
      <textarea class="form-input" id="t_expected" rows="2">${escapeHtml(t.expectedOutput||'')}</textarea>`;
  } else if (type === 'blockly') {
    html = `
      <label>Ожидаемый JavaScript-код (необязательно — для автопроверки)</label>
      <textarea class="form-input" id="t_expected" rows="3" style="font-family:Fira Code,monospace;font-size:13px">${escapeHtml(t.expectedOutput||'')}</textarea>
      <p style="color:#64748b;font-size:13px;margin-top:6px">Ученик составляет программу из блоков Blockly. Можно проверять автоматически или вручную.</p>`;
  } else if (type === 'java' || type === 'cpp') {
    const langLabel = type === 'java' ? 'Java' : 'C++';
    const defStarter = type === 'java'
      ? 'import java.util.Scanner;\n\npublic class Main {\n    public static void main(String[] args) {\n        // твой код\n    }\n}\n'
      : '#include <iostream>\nusing namespace std;\n\nint main() {\n    // твой код\n    return 0;\n}\n';
    html = `
      <label>Ожидаемый вывод программы (stdout)</label>
      <textarea class="form-input" id="t_expected" rows="3" style="font-family:Fira Code,monospace">${escapeHtml(t.expectedOutput||'')}</textarea>
      <label style="margin-top:10px">Ввод (stdin, необязательно)</label>
      <textarea class="form-input" id="t_stdin" rows="2" style="font-family:Fira Code,monospace">${escapeHtml(t.stdin||'')}</textarea>
      <label style="margin-top:10px">Стартовый код ${langLabel} (необязательно)</label>
      <textarea class="form-input" id="t_starter" rows="6" style="font-family:Fira Code,monospace;font-size:13px">${escapeHtml(t.starter||defStarter)}</textarea>
      <p style="color:#64748b;font-size:13px;margin-top:6px">Код компилируется и запускается на бесплатном публичном сервисе Piston (https://emkc.org). Проверка — сравнение stdout с ожидаемым.</p>`;
  }
  document.getElementById('typeFields').innerHTML = html;
}

async function saveTask(id) {
  const type = document.getElementById('t_type').value;
  const data = {
    type,
    module: document.getElementById('t_module').value,
    difficulty: parseInt(document.getElementById('t_diff').value) || 1,
    title: document.getElementById('t_title').value.trim(),
    description: document.getElementById('t_desc').value.trim(),
    explain: document.getElementById('t_explain').value.trim(),
  };
  const err = document.getElementById('modalErr');
  if (!data.title || !data.description) { err.textContent = 'Введи название и условие'; return; }
  if (type === 'quiz') {
    data.options = Array.from(document.querySelectorAll('.t_option')).map(i => i.value.trim());
    const r = document.querySelector('input[name=t_correct]:checked');
    if (!r) { err.textContent = 'Отметь правильный вариант'; return; }
    data.answer = parseInt(r.value);
  } else if (type === 'fill') {
    data.answer = document.getElementById('t_answer').value.trim();
    if (!data.answer) { err.textContent = 'Введи правильный ответ'; return; }
  } else if (type === 'order') {
    data.items = document.getElementById('t_items').value.split('\n').map(s=>s.trim()).filter(Boolean);
    if (data.items.length < 2) { err.textContent = 'Минимум 2 строки'; return; }
  } else if (type === 'code') {
    data.expectedOutput = document.getElementById('t_expected').value;
    data.starter = document.getElementById('t_starter').value;
  } else if (type === 'scratch') {
    data.scratchProjectId = document.getElementById('t_scratch_id').value.trim();
  } else if (type === 'htmlcss') {
    data.starter = document.getElementById('t_starter').value;
    data.expectedOutput = document.getElementById('t_expected').value;
  } else if (type === 'blockly') {
    data.expectedOutput = document.getElementById('t_expected').value;
  } else if (type === 'java' || type === 'cpp') {
    data.expectedOutput = document.getElementById('t_expected').value;
    data.starter = document.getElementById('t_starter').value;
    data.stdin = document.getElementById('t_stdin').value;
  }

  try {
    if (id && id !== 'null') await API.updateTask(id, data);
    else await API.createTask(data);
    closeModal(); await render(); showToast('<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px"> Сохранено','success');
  } catch (e) { err.textContent = e.message; }
}

async function removeTask(id) {
  if (!confirm('Удалить задачу?')) return;
  try { await API.deleteTask(id); await render(); }
  catch (e) { alert(e.message); }
}

let cacheAccess = [];
let cacheMaterials = [];

async function renderMaterials() {
  document.getElementById('tab').innerHTML = 'Загружаем…';
  try {
    [cacheAccess, cacheMaterials] = await Promise.all([
      API._request('GET', '/api/teacher-course-access'),
      API._request('GET', '/api/materials'),
    ]);
  } catch(e) {
    document.getElementById('tab').innerHTML = `<div class="card" style="padding:24px;color:#ef4444">Ошибка: ${escapeHtml(e.message)}</div>`;
    return;
  }
  const now = Date.now();
  document.getElementById('tab').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1>Материалы курсов</h1>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" onclick="openAccessForm()">Выдать доступ учителю</button>
        <button class="btn" onclick="openMaterialForm()">Добавить материал</button>
      </div>
    </div>

    <h2 class="section-title">Доступы учителей к курсам</h2>
    <table class="table" style="margin-bottom:28px">
      <thead><tr><th>Учитель</th><th>Курс</th><th>Выдан</th><th>Истекает</th><th>Статус</th><th></th></tr></thead>
      <tbody>
        ${cacheAccess.length ? cacheAccess.map(a => {
          const teacher = cache.users.find(u => u.id === a.teacherId);
          const mod = cache.modules.find(m => m.id === a.courseId);
          const active = a.expiresAt > now;
          return `<tr>
            <td>${teacher ? escapeHtml(teacher.name) : a.teacherId}</td>
            <td>${mod ? escapeHtml(mod.title) : a.courseId}</td>
            <td>${new Date(a.grantedAt).toLocaleDateString('ru')}</td>
            <td>${new Date(a.expiresAt).toLocaleDateString('ru')}</td>
            <td><span class="badge ${active ? 'badge-success' : 'badge-danger'}">${active ? 'Активен' : 'Истёк'}</span></td>
            <td>
              <button class="btn btn-ghost" onclick="openAccessForm('${a.id}')">✏️</button>
              <button class="btn btn-ghost" style="color:#ef4444" onclick="removeAccess('${a.id}')">🗑</button>
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:24px">Доступов нет</td></tr>'}
      </tbody>
    </table>

    <h2 class="section-title">Материалы</h2>
    <table class="table">
      <thead><tr><th>Название</th><th>Курс</th><th>Тип</th><th>Создал</th><th>Дата</th><th></th></tr></thead>
      <tbody>
        ${cacheMaterials.length ? cacheMaterials.map(m => {
          const mod = cache.modules.find(x => x.id === m.courseId);
          const creator = cache.users.find(u => u.id === m.createdBy);
          const typeLabel = {presentation:'📊 Презентация',task:'📝 Задача',text:'📄 Текст',file:'📎 Файл'}[m.type] || m.type;
          return `<tr>
            <td><b>${escapeHtml(m.title)}</b></td>
            <td>${mod ? escapeHtml(mod.title) : m.courseId}</td>
            <td>${typeLabel}</td>
            <td>${creator ? escapeHtml(creator.name) : '—'}</td>
            <td>${new Date(m.createdAt).toLocaleDateString('ru')}</td>
            <td>
              <button class="btn btn-ghost" onclick="openMaterialForm('${m.id}')">✏️</button>
              <button class="btn btn-ghost" style="color:#ef4444" onclick="removeMaterial('${m.id}')">🗑</button>
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:24px">Материалов нет</td></tr>'}
      </tbody>
    </table>
  `;
}

function openMaterialForm(id) {
  const m = id ? cacheMaterials.find(x => x.id === id) : {};
  const moduleOptions = cache.modules.map(mod =>
    `<option value="${mod.id}" ${(m.courseId||'')=== mod.id?'selected':''}>${escapeHtml(mod.title)}</option>`
  ).join('');
  const typeOptions = ['presentation','task','text','file'].map(t =>
    `<option value="${t}" ${(m.type||'text')===t?'selected':''}>${{presentation:'📊 Презентация',task:'📝 Задача',text:'📄 Текст',file:'📎 Файл'}[t]}</option>`
  ).join('');
  document.getElementById('modalContent').innerHTML = `
    <h2>${id ? 'Редактировать' : 'Добавить'} материал</h2>
    <div class="form-group"><label>Название</label><input class="form-input" id="m_title" value="${escapeHtml(m.title||'')}" placeholder="Название материала"></div>
    <div class="form-group"><label>Курс</label><select class="form-input" id="m_course"><option value="">—</option>${moduleOptions}</select></div>
    <div class="form-group"><label>Тип</label><select class="form-input" id="m_type">${typeOptions}</select></div>
    <div class="form-group"><label>Содержимое / Ссылка</label><textarea class="form-input" id="m_content" rows="5" placeholder="Текст, URL или путь к файлу">${escapeHtml(m.content||'')}</textarea></div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" onclick="saveMaterial('${id||''}')">Сохранить</button>
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
}

async function saveMaterial(id) {
  const body = {
    title:    document.getElementById('m_title').value.trim(),
    courseId: document.getElementById('m_course').value,
    type:     document.getElementById('m_type').value,
    content:  document.getElementById('m_content').value.trim() || null,
  };
  const err = document.getElementById('modalErr');
  if (!body.title || !body.courseId) { err.textContent = 'Заполните название и курс'; return; }
  try {
    if (id) await API._request('PUT', `/api/materials/${id}`, body);
    else    await API._request('POST', '/api/materials', body);
    closeModal(); await renderMaterials(); showToast('Материал сохранён', 'success');
  } catch(e) { err.textContent = e.message; }
}

async function removeMaterial(id) {
  if (!confirm('Удалить материал?')) return;
  try {
    await API._request('DELETE', `/api/materials/${id}`);
    await renderMaterials(); showToast('Удалено', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

function openAccessForm(id) {
  const a = id ? cacheAccess.find(x => x.id === id) : {};
  const teacherOptions = cache.users
    .filter(u => u.role === 'teacher' || u.role === 'assistant')
    .map(u => `<option value="${u.id}" ${(a.teacherId||'')=== u.id?'selected':''}>${escapeHtml(u.name)}</option>`)
    .join('');
  const courseOptions = cache.modules.map(m =>
    `<option value="${m.id}" ${(a.courseId||'')=== m.id?'selected':''}>${escapeHtml(m.title)}</option>`
  ).join('');
  const defExpires = a.expiresAt
    ? new Date(a.expiresAt).toISOString().slice(0,10)
    : new Date(Date.now()+90*24*3600*1000).toISOString().slice(0,10);
  document.getElementById('modalContent').innerHTML = `
    <h2>${id ? 'Изменить доступ' : 'Выдать доступ учителю'}</h2>
    ${!id ? `<div class="form-group"><label>Учитель</label><select class="form-input" id="a_teacher"><option value="">—</option>${teacherOptions}</select></div>` : ''}
    ${!id ? `<div class="form-group"><label>Курс</label><select class="form-input" id="a_course"><option value="">—</option>${courseOptions}</select></div>` : ''}
    <div class="form-group"><label>Действует до</label><input class="form-input" type="date" id="a_expires" value="${defExpires}"></div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" onclick="saveAccess('${id||''}')">Сохранить</button>
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
}

async function saveAccess(id) {
  const err = document.getElementById('modalErr');
  const expiresAt = new Date(document.getElementById('a_expires').value).getTime();
  if (!expiresAt) { err.textContent = 'Укажите дату'; return; }
  try {
    if (id) {
      await API._request('PUT', `/api/teacher-course-access/${id}`, { expiresAt });
    } else {
      const teacherId = document.getElementById('a_teacher').value;
      const courseId  = document.getElementById('a_course').value;
      if (!teacherId || !courseId) { err.textContent = 'Выберите учителя и курс'; return; }
      await API._request('POST', '/api/teacher-course-access', { teacherId, courseId, expiresAt });
    }
    closeModal(); await renderMaterials(); showToast('Доступ сохранён', 'success');
  } catch(e) { err.textContent = e.message; }
}

async function removeAccess(id) {
  if (!confirm('Отозвать доступ?')) return;
  try {
    await API._request('DELETE', `/api/teacher-course-access/${id}`);
    await renderMaterials(); showToast('Доступ отозван', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

function openFeedbackForm() {

    .filter(u => u.role === 'student')

  const moduleOptions = cache.modules

  document.getElementById('modalContent').innerHTML = `

        <button class="btn btn-secondary" onclick="doImport(true)">🔍 Предпросмотр</button>
        <button class="btn" onclick="doImport(false)">✅ Импортировать</button>
      </div>
      <div id="imp_result" style="margin-top:18px"></div>
    </div>
  `;
}

function doExport(type, format) {
  fetch(`/api/export/${type}?format=${format}`, {
    headers: { Authorization: 'Bearer ' + API.getToken() }
  })
  .then(r => r.ok ? r.blob() : r.json().then(j => { throw new Error(j.error); }))
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${type}.${format}`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  })
  .catch(e => showToast('Ошибка экспорта: ' + e.message, 'error'));
}

async function doImport(dryRun) {
  const type = document.getElementById('imp_type').value;
  const file = document.getElementById('imp_file').files[0];
  const result = document.getElementById('imp_result');
  if (!file) { result.innerHTML = '<span style="color:#ef4444">Выберите файл</span>'; return; }
  const text = await file.text();
  const format = file.name.endsWith('.csv') ? 'csv' : 'json';
  result.innerHTML = 'Обработка…';
  try {
    const resp = await API._request('POST', `/api/import/${type}`, { format, data: text, dryRun });
    if (dryRun) {
      const errHtml = resp.errors && resp.errors.length
        ? `<div style="margin-top:10px"><b style="color:#ef4444">Ошибки (${resp.errors.length}):</b><ul style="margin:6px 0 0 20px">` +
          resp.errors.map(e => `<li>Строка ${e.line}: ${escapeHtml(e.error)}</li>`).join('') + '</ul></div>'
        : '';
      result.innerHTML = `<div class="card" style="padding:16px;background:#f0fdf4;border:1px solid #86efac">
        📋 Предпросмотр: найдено <b>${resp.total}</b>, корректных <b style="color:#16a34a">${resp.valid}</b>${errHtml}</div>`;
    } else {
      result.innerHTML = `<div class="card" style="padding:16px;background:#f0fdf4;border:1px solid #86efac">
        ✅ Импортировано: <b>${resp.imported}</b> записей</div>`;
      await loadAll();
    }
  } catch(e) {
    result.innerHTML = `<div class="card" style="padding:16px;background:#fef2f2;border:1px solid #fca5a5;color:#ef4444">
      Ошибка: ${escapeHtml(e.message)}</div>`;
  }
}

  if (!g) return;
  document.getElementById('modalContent').innerHTML = '<h2>Загружаем…</h2>';
  document.getElementById('modal').classList.add('active');
  let schedule = [], members = [];
  try {
    [schedule, members] = await Promise.all([
      API._request('GET', `/api/groups/${gid}/schedule`),
      API._request('GET', `/api/groups/${gid}/members`),
    ]);
  } catch(e) { document.getElementById('modalContent').innerHTML = `<h2>Ошибка: ${escapeHtml(e.message)}</h2><button class="btn btn-outline" onclick="closeModal()">Закрыть</button>`; return; }

  const memberRows = members.map(m => {
    const u = cache.users.find(x => x.id === m.studentId);
    return `<tr>
      <td>${u ? escapeHtml(u.name) : m.studentId}</td>
      <td>${new Date(m.since).toLocaleDateString('ru')}</td>
      <td>${m.until ? new Date(m.until).toLocaleDateString('ru') : '—'}</td>
      <td><button class="btn btn-ghost" style="color:#ef4444" onclick="removeMember('${gid}','${m.id}')">🗑</button></td>
    </tr>`;
  }).join('');

  const scheduleRows = schedule.map(s => `<tr>
    <td>${WEEKDAYS[s.weekday]}</td>
    <td>${escapeHtml(s.startTime)}</td>
    <td>${s.durationMin} мин</td>
    <td><button class="btn btn-ghost" style="color:#ef4444" onclick="removeSchedule('${gid}','${s.id}')">🗑</button></td>
  </tr>`).join('');

  const students = cache.users.filter(u => u.role==='student');
  document.getElementById('modalContent').innerHTML = `
    <h2>${escapeHtml(g.name)}</h2>
    <p style="color:#64748b;margin-top:-6px">Расписание и состав группы</p>

    <h3 style="margin-top:14px">📅 Расписание</h3>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <select class="form-input" id="s_wd" style="flex:1;min-width:90px">
        ${WEEKDAYS.map((d,i) => `<option value="${i}" ${i===1?'selected':''}>${d}</option>`).join('')}
      </select>
      <input class="form-input" id="s_time" type="time" value="15:00" style="flex:1;min-width:90px">
      <input class="form-input" id="s_dur" type="number" value="60" min="15" max="240" style="flex:1;min-width:80px">
      <button class="btn" onclick="addSchedule('${gid}')">+ Добавить</button>
    </div>
    <table class="table" style="margin-bottom:18px">
      <thead><tr><th>День</th><th>Время</th><th>Длительность</th><th></th></tr></thead>
      <tbody>${scheduleRows || '<tr><td colspan="4" style="text-align:center;color:#64748b">Расписание не задано</td></tr>'}</tbody>
    </table>

    <h3>👥 Состав группы</h3>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <select class="form-input" id="m_student" style="flex:1">
        <option value="">— выберите ученика —</option>
        ${students.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}
      </select>
      <button class="btn" onclick="addMember('${gid}')">+ Добавить</button>
    </div>
    <table class="table">
      <thead><tr><th>Ученик</th><th>С</th><th>По</th><th></th></tr></thead>
      <tbody>${memberRows || '<tr><td colspan="4" style="text-align:center;color:#64748b">Учеников нет</td></tr>'}</tbody>
    </table>

    <div style="margin-top:16px;text-align:right"><button class="btn btn-outline" onclick="closeModal()">Закрыть</button></div>`;
}

async function addSchedule(gid) {
  const body = {
    weekday: Number(document.getElementById('s_wd').value),
    startTime: document.getElementById('s_time').value,
    durationMin: Number(document.getElementById('s_dur').value),
  };
  try { await API._request('POST', `/api/groups/${gid}/schedule`, body); openGroupDetails(gid); }
  catch(e) { showToast(e.message,'error'); }
}

async function removeSchedule(gid, sid) {
  if (!confirm('Удалить слот расписания?')) return;
  try { await API._request('DELETE', `/api/groups/${gid}/schedule/${sid}`); openGroupDetails(gid); }
  catch(e) { showToast(e.message,'error'); }
}

async function addMember(gid) {
  const studentId = document.getElementById('m_student').value;
  if (!studentId) { showToast('Выберите ученика','error'); return; }
  try { await API._request('POST', `/api/groups/${gid}/members`, { studentId, since: Date.now() }); openGroupDetails(gid); }
  catch(e) { showToast(e.message,'error'); }
}

async function removeMember(gid, mid) {
  if (!confirm('Убрать ученика из группы?')) return;
  try { await API._request('DELETE', `/api/groups/${gid}/members/${mid}`); openGroupDetails(gid); }
  catch(e) { showToast(e.message,'error'); }
}

/* ---------- КЛИЕНТЫ (карточки CRM) ---------- */
let clientsFilter = { branch:'', group:'', status:'', manager:'' };

async function renderClients() {
  document.getElementById('tab').innerHTML = 'Загружаем…';
  try {
    await loadCrmCore();
    const qs = new URLSearchParams();
    if (clientsFilter.branch)  qs.set('branch', clientsFilter.branch);
    if (clientsFilter.group)   qs.set('group', clientsFilter.group);
    if (clientsFilter.status)  qs.set('status', clientsFilter.status);
    if (clientsFilter.manager) qs.set('manager', clientsFilter.manager);
    const url = '/api/students-crm' + (qs.toString() ? '?' + qs.toString() : '');
    crmCache.clients = await API._request('GET', url);
  } catch(e) {
    document.getElementById('tab').innerHTML = `<div class="card" style="padding:24px;color:#ef4444">${escapeHtml(e.message)}</div>`; return;
  }
  const managers = cache.users.filter(u => u.role==='admin' || u.role==='teacher');
  document.getElementById('tab').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1>Клиенты (CRM)</h1>
      <button class="btn" onclick="openClientForm()">+ Завести карточку</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <select class="form-input" style="flex:1;min-width:140px" onchange="clientsFilter.branch=this.value;renderClients()">
        <option value="">Все филиалы</option>
        ${crmCache.branches.map(b => `<option value="${b.id}" ${clientsFilter.branch===b.id?'selected':''}>${escapeHtml(b.name)}</option>`).join('')}
      </select>
      <select class="form-input" style="flex:1;min-width:140px" onchange="clientsFilter.group=this.value;renderClients()">
        <option value="">Все группы</option>
        ${crmCache.groups.map(g => `<option value="${g.id}" ${clientsFilter.group===g.id?'selected':''}>${escapeHtml(g.name)}</option>`).join('')}
      </select>
      <select class="form-input" style="flex:1;min-width:140px" onchange="clientsFilter.status=this.value;renderClients()">
        <option value="">Все статусы</option>
        <option value="active"   ${clientsFilter.status==='active'?'selected':''}>Активный</option>
        <option value="frozen"   ${clientsFilter.status==='frozen'?'selected':''}>Заморожен</option>
        <option value="inactive" ${clientsFilter.status==='inactive'?'selected':''}>Неактивен</option>
      </select>
      <select class="form-input" style="flex:1;min-width:140px" onchange="clientsFilter.manager=this.value;renderClients()">
        <option value="">Все менеджеры</option>
        ${managers.map(m => `<option value="${m.id}" ${clientsFilter.manager===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('')}
      </select>
    </div>
    <table class="table">
      <thead><tr><th>ФИО</th><th>Филиал</th><th>Тариф</th><th>Остаток</th><th>Статус</th><th>Видео</th><th></th></tr></thead>
      <tbody>
        ${crmCache.clients.length ? crmCache.clients.map(c => {
          const branch = crmCache.branches.find(b => b.id === c.branchId);
          const tariff = crmCache.tariffs.find(t => t.id === c.tariffId);
          return `<tr>
            <td><b>${escapeHtml(c.fullName)}</b></td>
            <td>${branch ? escapeHtml(branch.name) : '—'}</td>
            <td>${tariff ? escapeHtml(tariff.name) : '—'}</td>
            <td>${c.visitsLeft != null ? c.visitsLeft : '—'}</td>
            <td><span class="badge ${c.status==='active'?'badge-success':c.status==='frozen'?'badge-warning':'badge-danger'}">${c.status}</span></td>
            <td>${c.videoConsent ? '🎥' : '—'}</td>
            <td>
              <button class="btn btn-ghost" onclick="openClientForm('${c.userId}')">✏️</button>
              <button class="btn btn-ghost" style="color:#ef4444" onclick="removeClient('${c.userId}')">🗑</button>
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="7" style="text-align:center;color:#64748b;padding:24px">Карточек нет</td></tr>'}
      </tbody>
    </table>`;
}

function openClientForm(userId) {
  const c = userId ? crmCache.clients.find(x => x.userId === userId) : {};
  const isEdit = !!userId;
  const candidateUsers = cache.users.filter(u => u.role === 'student');
  const userOpts = candidateUsers.map(u =>
    `<option value="${u.id}">${escapeHtml(u.name)} (${escapeHtml(u.login)})</option>`).join('');
  const branchOpts = crmCache.branches.map(b =>
    `<option value="${b.id}" ${(c.branchId||'')===b.id?'selected':''}>${escapeHtml(b.name)}</option>`).join('');
  const tariffOpts = crmCache.tariffs.map(t =>
    `<option value="${t.id}" ${(c.tariffId||'')===t.id?'selected':''}>${escapeHtml(t.name)} (${t.visitsCount}/${t.durationDays}д)</option>`).join('');
  const managerOpts = cache.users.filter(u => u.role==='admin'||u.role==='teacher').map(m =>
    `<option value="${m.id}" ${(c.responsibleManagerId||'')===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('');
  // его группы (для просмотра)
  const myMemberships = userId ? [] : []; // simplified — фаза 3 даст историю

  document.getElementById('modalContent').innerHTML = `
    <h2>${isEdit ? 'Карточка клиента' : 'Новая карточка'}</h2>
    ${!isEdit ? `<div class="form-group"><label>Пользователь</label><select class="form-input" id="c_user"><option value="">—</option>${userOpts}</select></div>` : ''}
    <div class="form-group"><label>ФИО полностью</label><input class="form-input" id="c_name" value="${escapeHtml(c.fullName||'')}"></div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1"><label>Дата рождения</label><input type="date" class="form-input" id="c_bd" value="${c.birthDate||''}"></div>
      <div class="form-group" style="flex:1"><label>Пол</label><select class="form-input" id="c_gender">
        <option value=""  ${!c.gender?'selected':''}>—</option>
        <option value="m" ${c.gender==='m'?'selected':''}>М</option>
        <option value="f" ${c.gender==='f'?'selected':''}>Ж</option>
      </select></div>
    </div>
    <div class="form-group"><label>Филиал</label><select class="form-input" id="c_branch"><option value="">—</option>${branchOpts}</select></div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:2"><label>Тариф</label><select class="form-input" id="c_tariff"><option value="">—</option>${tariffOpts}</select></div>
      <div class="form-group" style="flex:1"><label>Остаток (занятий)</label><input type="number" class="form-input" id="c_left" value="${c.visitsLeft||0}"></div>
    </div>
    <div class="form-group"><label>Дата выдачи абонемента</label><input type="date" class="form-input" id="c_subdate" value="${c.subscriptionIssuedAt? new Date(c.subscriptionIssuedAt).toISOString().slice(0,10):''}"></div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1"><label>Статус</label><select class="form-input" id="c_status">
        <option value="active"   ${(c.status||'active')==='active'?'selected':''}>Активный</option>
        <option value="frozen"   ${c.status==='frozen'?'selected':''}>Заморожен</option>
        <option value="inactive" ${c.status==='inactive'?'selected':''}>Неактивен</option>
      </select></div>
      <div class="form-group" style="flex:1"><label>Ответственный менеджер</label><select class="form-input" id="c_mgr"><option value="">—</option>${managerOpts}</select></div>
    </div>
    <h3 style="margin-top:14px;font-size:14px;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Родитель</h3>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1"><label>Имя</label><input class="form-input" id="c_pname" value="${escapeHtml(c.parentName||'')}"></div>
      <div class="form-group" style="flex:1"><label>Телефон</label><input class="form-input" id="c_pphone" value="${escapeHtml(c.parentPhone||'')}"></div>
    </div>
    <div class="form-group"><label>Документ (ID/паспорт)</label><input class="form-input" id="c_doc" value="${escapeHtml(c.documentId||'')}"></div>
    <div class="form-group"><label>Комментарий</label><textarea class="form-input" id="c_comment" rows="2">${escapeHtml(c.comment||'')}</textarea></div>
    <div class="form-group"><label><input type="checkbox" id="c_video" ${c.videoConsent?'checked':''}> Согласие на видеосъёмку</label></div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" onclick="saveClient('${userId||''}')">Сохранить</button>
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
}

async function saveClient(userId) {
  const err = document.getElementById('modalErr');
  const body = {
    fullName: document.getElementById('c_name').value.trim(),
    birthDate: document.getElementById('c_bd').value || null,
    gender: document.getElementById('c_gender').value || null,
    branchId: document.getElementById('c_branch').value || null,
    tariffId: document.getElementById('c_tariff').value || null,
    visitsLeft: Number(document.getElementById('c_left').value) || 0,
    subscriptionIssuedAt: document.getElementById('c_subdate').value ? new Date(document.getElementById('c_subdate').value).getTime() : null,
    status: document.getElementById('c_status').value,
    responsibleManagerId: document.getElementById('c_mgr').value || null,
    parentName: document.getElementById('c_pname').value.trim() || null,
    parentPhone: document.getElementById('c_pphone').value.trim() || null,
    documentId: document.getElementById('c_doc').value.trim() || null,
    comment: document.getElementById('c_comment').value.trim() || null,
    videoConsent: document.getElementById('c_video').checked,
  };
  if (body.videoConsent) body.videoConsentDate = Date.now();
  if (!body.fullName) { err.textContent = 'ФИО обязательно'; return; }
  try {
    if (userId) {
      await API._request('PUT', `/api/students-crm/${userId}`, body);
    } else {
      body.userId = document.getElementById('c_user').value;
      if (!body.userId) { err.textContent = 'Выберите пользователя'; return; }
      await API._request('POST', '/api/students-crm', body);
    }
    closeModal(); await renderClients(); showToast('Сохранено','success');
  } catch(e) { err.textContent = e.message; }
}

async function removeClient(userId) {
  if (!confirm('Удалить карточку клиента?')) return;
  try { await API._request('DELETE', `/api/students-crm/${userId}`); await renderClients(); showToast('Удалено','success'); }
  catch(e) { showToast(e.message,'error'); }
}

/* ---------- ПРАВА УЧИТЕЛЕЙ ---------- */
const PERMISSION_KEYS = [
  { key: 'can_edit_materials',       label: 'Может редактировать материалы (без выдачи доступа)' },
  { key: 'see_subscription_balance', label: 'Видит остатки абонементов клиентов' },
  { key: 'see_parent_contacts',      label: 'Видит контакты родителей' },
  { key: 'can_create_feedback_internal', label: 'Может создавать внутренние отзывы' },
];

async function renderTeacherPerms() {
  const teachers = cache.users.filter(u => u.role==='teacher' || u.role==='admin');
  document.getElementById('tab').innerHTML = `
    <h1>Права учителей</h1>
    <p style="color:#64748b;margin-top:6px">Гибкие флаги доступа. Изменения применяются сразу.</p>
    <div id="permsList" style="margin-top:18px">Загружаем…</div>`;
  try {
    const perms = {};
    for (const t of teachers) {
      perms[t.id] = await API._request('GET', `/api/teacher-permissions/${t.id}`).catch(() => ({}));
    }
    crmCache.perms = perms;
    document.getElementById('permsList').innerHTML = teachers.map(t => `
      <div class="card" style="padding:18px;margin-bottom:12px">
        <h3 style="margin-bottom:10px">${escapeHtml(t.name)} <span class="badge badge-${t.role==='admin'?'danger':'warning'}">${t.role}</span></h3>
        <div style="display:flex;flex-wrap:wrap;gap:14px">
          ${PERMISSION_KEYS.map(p => `
            <label style="display:flex;align-items:center;gap:8px;min-width:280px">
              <input type="checkbox" data-teacher="${t.id}" data-key="${p.key}" ${perms[t.id][p.key]?'checked':''} onchange="savePerm(this)">
              ${escapeHtml(p.label)}
            </label>`).join('')}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('permsList').innerHTML = `<div class="card" style="padding:18px;color:#ef4444">${escapeHtml(e.message)}</div>`;
  }
}

async function savePerm(input) {
  const tid = input.dataset.teacher;
  const key = input.dataset.key;
  const val = input.checked;
  try {
    await API._request('PUT', `/api/teacher-permissions/${tid}`, { [key]: val });
    showToast('Сохранено','success');
  } catch(e) {
    input.checked = !val;
    showToast(e.message,'error');
  }
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
</script>
