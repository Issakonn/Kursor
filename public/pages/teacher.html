<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><title>Кабинет учителя — КУРСОР</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/uploads/mascot/happy.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .live-dot {
    display:inline-block;width:10px;height:10px;border-radius:50%;background:#10b981;
    box-shadow:0 0 0 0 rgba(16,185,129,0.6);animation:livePulse 1.6s infinite;
    margin-right:6px;vertical-align:middle;
  }
  .live-dot.offline { background:#ef4444; animation:none; box-shadow:none; }
  @keyframes livePulse {
    0% { box-shadow:0 0 0 0 rgba(16,185,129,0.6); }
    70% { box-shadow:0 0 0 12px rgba(16,185,129,0); }
    100% { box-shadow:0 0 0 0 rgba(16,185,129,0); }
  }
  .row-flash { animation: rowFlash 1.5s ease-out; }
  @keyframes rowFlash {
    0% { background:#fef9c3; }
    100% { background:transparent; }
  }
</style>
</head>
<body>
<div id="nav"></div>
<div class="container"><div id="content">Загружаем…</div></div>
<script src="/data/database.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
const user = requireAuth(['teacher','admin']);
let state = { students: [], tasks: [], modules: [], progressById: {} };

if (user) init();

async function init() {
  document.getElementById('nav').innerHTML = renderNavbar('teacher');
  try {
    const [students, tasks, modules, allProgress, myAccess, myMaterials] = await Promise.all([
      API.getStudents(), API.getTasks(), API.getModules(), API.getAllProgress(),
      API._request('GET', '/api/teacher-course-access').catch(() => []),
      API._request('GET', '/api/materials').catch(() => []),
    ]);
    state.students = students;
    state.tasks = tasks;
    state.modules = modules;
    state.progressById = Object.fromEntries(allProgress.map(p => [p.userId, p]));
    state.myAccess = myAccess;
    state.myMaterials = myMaterials;
    render();
    connectLive();
  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="card" style="padding:30px;text-align:center;color:#ef4444">Ошибка: ${escapeHtml(err.message)}</div>`;
  }
}

function render() {
  const { students, tasks, progressById } = state;

  document.getElementById('content').innerHTML = `
    <div class="welcome-banner">
      <img src="${KURSOR_DB.MASCOT.sitting}" class="mascot-md" alt="">
      <div>
        <h1>Здравствуйте, ${escapeHtml(user.name)}</h1>
        <p>
          <span id="liveIndicator"><span class="live-dot offline"></span><span id="liveLabel">подключаемся…</span></span>
          · Прогресс учеников обновляется в реальном времени.
        </p>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <button class="btn btn-secondary" onclick="showMaterials()">📚 Материалы курсов</button>
      <button class="btn btn-secondary" onclick="showFeedbackTeacher()">💬 Мои отзывы</button>
      <button class="btn btn-secondary" onclick="showMyGroups()">👥 Мои группы</button>
    </div>
    <h2 class="section-title">Все ученики (${students.length})</h2>
    <table class="table" id="studentsTable">
      <thead><tr>
        <th>Имя</th><th>Логин</th><th>Группа</th><th>Языки</th>
        <th>Очки</th><th>Streak</th><th>Решено</th><th>Проекты на проверку</th>
      </tr></thead>
      <tbody>
        ${students.map(s => renderRow(s, progressById[s.id], tasks)).join('')
          || '<tr><td colspan="8" style="text-align:center;color:#64748b;padding:30px">Учеников нет. Создайте через админ-панель.</td></tr>'}
      </tbody>
    </table>
  `;
}

function renderRow(s, p, tasks) {
  p = p || { points:0, streak:0, tasks:{}, badges:[] };
  const projectSubmissions = Object.entries(p.tasks).filter(([id, pr]) => {
    const t = tasks.find(t => t.id === parseInt(id));
    return t && t.type === 'project' && pr.submission;
  });
  const done = Object.values(p.tasks).filter(t => t.status === 'done').length;
  return `
    <tr style="cursor:pointer" data-student="${s.id}" onclick="showStudent('${s.id}')">
      <td><b>${escapeHtml(s.name)}</b></td>
      <td><code>${escapeHtml(s.login)}</code></td>
      <td>${KURSOR_DB.GROUPS[s.group]?.name || '—'}</td>
      <td>${(s.languages || []).map(l => KURSOR_DB.LANGS[l]?.emoji || '').join(' ')}</td>
      <td data-points><img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" style="width:14px;height:14px;vertical-align:-2px"> ${p.points}</td>
      <td data-streak><img src="https://cdn-icons-png.flaticon.com/512/785/785116.png" style="width:14px;height:14px;vertical-align:-2px"> ${p.streak}</td>
      <td data-done><img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:14px;height:14px;vertical-align:-2px"> ${done}</td>
      <td data-projects>${projectSubmissions.length ? `<span class="badge badge-warning">${projectSubmissions.length}</span>` : '—'}</td>
    </tr>`;
}

function showStudent(id) {
  const s = state.students.find(u => u.id === id);
  if (!s) return;
  const p = state.progressById[id] || { points:0, streak:0, tasks:{}, badges:[] };
  const submissions = Object.entries(p.tasks).filter(([tid, pr]) => {
    const t = state.tasks.find(t => t.id === parseInt(tid));
    return t && t.type === 'project' && pr.submission;
  });

  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${escapeHtml(s.name)}</h2>
      <p>Логин: <code>${escapeHtml(s.login)}</code> · Возраст: ${s.age} · Группа: ${KURSOR_DB.GROUPS[s.group]?.name || '—'}</p>
      <p style="margin-top:10px"><b>Языки:</b> ${(s.languages || []).map(l => KURSOR_DB.LANGS[l]?.name).join(', ') || '—'}</p>
      <div style="margin-top:14px;display:flex;gap:14px;flex-wrap:wrap">
        <div><b style="font-size:20px"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" style="width:14px;height:14px;vertical-align:-2px"> ${p.points}</b><br>очков</div>
        <div><b style="font-size:20px"><img src="https://cdn-icons-png.flaticon.com/512/785/785116.png" style="width:14px;height:14px;vertical-align:-2px"> ${p.streak}</b><br>streak</div>
        <div><b style="font-size:20px">${Object.values(p.tasks).filter(t=>t.status==='done').length}</b><br>задач</div>
      </div>
      ${submissions.length ? `
        <h3 style="margin-top:20px">Проекты на проверку</h3>
        ${submissions.map(([tid, pr]) => {
          const t = state.tasks.find(t => t.id === parseInt(tid));
          return `
            <div style="background:#f8fafc;padding:12px;border-radius:8px;margin-top:10px">
              <b>${escapeHtml(t.title)}</b>
              <div style="margin-top:6px;white-space:pre-wrap;font-size:14px">${escapeHtml(pr.submission)}</div>
              <div style="margin-top:8px;font-size:12px;color:#64748b">Сдано: ${new Date(pr.completedAt).toLocaleString('ru-RU')}</div>
            </div>`;
        }).join('')}
      ` : ''}
      <div style="margin-top:20px;text-align:right">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Закрыть</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
}

// ===== Real-time: WebSocket =====
function connectLive() {
  const ws = API.connectWS(handleWsMessage);
  if (!ws) return;
  ws.addEventListener('open', () => setLive(true));
  ws.addEventListener('close', () => {
    setLive(false);
    setTimeout(connectLive, 3000);
  });
  ws.addEventListener('error', () => setLive(false));
}

function setLive(online) {
  const el = document.getElementById('liveIndicator');
  if (!el) return;
  el.innerHTML = `<span class="live-dot ${online?'':'offline'}"></span><span>${online?'live':'офлайн'}</span>`;
}

function handleWsMessage(msg) {
  if (msg.type === 'progress') {
    state.progressById[msg.studentId] = msg.progress;
    updateRow(msg.studentId);
  }
}

function updateRow(studentId) {
  const tr = document.querySelector(`tr[data-student="${studentId}"]`);
  const s = state.students.find(u => u.id === studentId);
  if (!tr || !s) return;
  const p = state.progressById[studentId];
  const done = Object.values(p.tasks).filter(t => t.status === 'done').length;
  const projectSubs = Object.entries(p.tasks).filter(([id, pr]) => {
    const t = state.tasks.find(t => t.id === parseInt(id));
    return t && t.type === 'project' && pr.submission;
  });
  tr.querySelector('[data-points]').textContent = `<img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" style="width:14px;height:14px;vertical-align:-2px"> ${p.points}`;
  tr.querySelector('[data-streak]').textContent = `<img src="https://cdn-icons-png.flaticon.com/512/785/785116.png" style="width:14px;height:14px;vertical-align:-2px"> ${p.streak}`;
  tr.querySelector('[data-done]').textContent   = `<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:14px;height:14px;vertical-align:-2px"> ${done}`;
  tr.querySelector('[data-projects]').innerHTML = projectSubs.length
    ? `<span class="badge badge-warning">${projectSubs.length}</span>` : '—';
  tr.classList.remove('row-flash');
  void tr.offsetWidth;
  tr.classList.add('row-flash');
}

/* ===== ФАЗА 1 — Материалы и фидбек у учителя ===== */
function showMaterials() {
  const now = Date.now();
  const { myAccess, myMaterials, modules } = state;
  const activeAccess = (myAccess||[]).filter(a => a.expiresAt > now);
  const accessibleCourseIds = activeAccess.map(a => a.courseId);

  if (!accessibleCourseIds.length) {
    document.getElementById('content').innerHTML += `
      <div class="card" style="padding:24px;margin-top:20px">
        <h2 class="section-title">Материалы курсов</h2>
        <p style="color:#64748b">У вас нет активного доступа ни к одному курсу. Обратитесь к администратору.</p>
      </div>`;
    return;
  }

  const byCourseMaterials = {};
  accessibleCourseIds.forEach(id => { byCourseMaterials[id] = []; });
  (myMaterials||[]).forEach(m => {
    if (byCourseMaterials[m.courseId]) byCourseMaterials[m.courseId].push(m);
  });

  const typeLabel = {presentation:'📊 Презентация',task:'📝 Задача',text:'📄 Текст',file:'📎 Файл'};

  const html = accessibleCourseIds.map(courseId => {
    const mod = (modules||[]).find(m => m.id === courseId);
    const acc = activeAccess.find(a => a.courseId === courseId);
    const mats = byCourseMaterials[courseId];
    return `
      <div class="card" style="padding:20px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3 style="margin:0">${escapeHtml(mod ? mod.title : courseId)}</h3>
          <span style="font-size:12px;color:#64748b">Доступ до: <b>${new Date(acc.expiresAt).toLocaleDateString('ru')}</b></span>
        </div>
        ${mats.length ? `
          <table class="table">
            <thead><tr><th>Название</th><th>Тип</th><th>Содержимое</th></tr></thead>
            <tbody>
              ${mats.map(m => `<tr>
                <td><b>${escapeHtml(m.title)}</b></td>
                <td>${typeLabel[m.type]||m.type}</td>
                <td style="max-width:300px;word-break:break-all;font-size:13px">${m.content ? escapeHtml(m.content) : '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>` : '<p style="color:#64748b;margin:0">Материалов для этого курса ещё нет</p>'}
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:16px">
      <button class="btn btn-outline" onclick="render()">← Назад к ученикам</button>
    </div>
    <h1>Материалы курсов</h1>
    <p style="color:#64748b;margin-bottom:20px">Активных доступов: <b>${activeAccess.length}</b></p>
    ${html}
  `;
}

async function showFeedbackTeacher() {
  let feedbackList = [];
  try { feedbackList = await API._request('GET', '/api/feedback'); } catch(e) {}
  const { students } = state;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <button class="btn btn-outline" onclick="render()">← Назад к ученикам</button>
      <button class="btn" onclick="openFeedbackFormTeacher()">Написать отзыв</button>
    </div>
    <h1>Мои отзывы об учениках</h1>
    <div id="feedbackListEl">
      ${feedbackList.length ? feedbackList.map(f => {
        const student = students.find(s => s.id === f.studentId);
        const typeLabel = {lesson:'📚 Урок',course:'🎓 Курс',general:'💬 Общий'}[f.type]||f.type;
        return `<div class="card" style="padding:16px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div><b>${student ? escapeHtml(student.name) : f.studentId}</b> · ${typeLabel}
              ${f.isInternal ? '<span class="badge badge-warning" style="margin-left:6px">🔒 Внутренний</span>' : ''}
            </div>
            <div style="font-size:12px;color:#64748b">${new Date(f.createdAt).toLocaleDateString('ru')}</div>
          </div>
          <div>${escapeHtml(f.text)}</div>
        </div>`;
      }).join('') : '<div class="card" style="padding:24px;text-align:center;color:#64748b">Отзывов пока нет</div>'}
    </div>
  `;
}

function openFeedbackFormTeacher() {
  const { students, modules } = state;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  const studentOpts = students.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
  const moduleOpts = modules.map(m => `<option value="${m.id}">${escapeHtml(m.title)}</option>`).join('');
  modal.innerHTML = `
    <div class="modal">
      <h2>Написать отзыв</h2>
      <div class="form-group"><label>Ученик</label><select class="form-input" id="tf_student"><option value="">—</option>${studentOpts}</select></div>
      <div class="form-group"><label>Тип</label>
        <select class="form-input" id="tf_type">
          <option value="general">💬 Общий</option>
          <option value="lesson">📚 По уроку</option>
          <option value="course">🎓 По курсу</option>
        </select>
      </div>
      <div class="form-group"><label>Курс (необязательно)</label><select class="form-input" id="tf_module"><option value="">—</option>${moduleOpts}</select></div>
      <div class="form-group"><label>Текст</label><textarea class="form-input" id="tf_text" rows="4"></textarea></div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="tf_internal">
        <label for="tf_internal" style="margin:0">🔒 Внутренний (не виден родителям)</label>
      </div>
      <div id="tf_err" style="color:#ef4444;min-height:18px"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn" id="tf_save">Сохранить</button>
        <button class="btn btn-outline" id="tf_cancel">Отмена</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#tf_cancel').onclick = () => modal.remove();
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.querySelector('#tf_save').onclick = async () => {
    const body = {
      studentId:  modal.querySelector('#tf_student').value,
      type:       modal.querySelector('#tf_type').value,
      moduleId:   modal.querySelector('#tf_module').value || null,
      text:       modal.querySelector('#tf_text').value.trim(),
      isInternal: modal.querySelector('#tf_internal').checked,
    };
    const err = modal.querySelector('#tf_err');
    if (!body.studentId) { err.textContent = 'Выберите ученика'; return; }
    if (!body.text)       { err.textContent = 'Введите текст'; return; }
    try {
      await API._request('POST', '/api/feedback', body);
      modal.remove();
      showToast('Отзыв сохранён', 'success');
      showFeedbackTeacher();
    } catch(e) { err.textContent = e.message; }
  };
}

</script>
</body>
</html>
<script>
/* ===== ФАЗА 2 — Мои группы у учителя ===== */

async function showMyGroups() {
  const section = document.getElementById('content');
  
  section.innerHTML = '<div style="padding:20px;color:#64748b">Загружаем группы…</div>';
  

  let groups, branches, tariffs, clients;
  try {
    [groups, branches, tariffs] = await Promise.all([
      API._request('GET', '/api/groups'),
      API._request('GET', '/api/branches'),
      API._request('GET', '/api/tariffs'),
    ]);
    try { clients = await API._request('GET', '/api/students-crm'); } catch { clients = []; }
  } catch(e) {
    section.innerHTML = `<div class="card" style="padding:20px;color:#ef4444">Ошибка: ${escapeHtml(e.message)}</div>`;
    return;
  }

  const DAYS = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

  let html = `<h2 class="section-title" style="margin-top:0">Мои группы</h2>`;
  if (!groups.length) {
    html += '<div class="card" style="padding:20px;color:#64748b">Вам не назначено ни одной группы.</div>';
  } else {
    for (const g of groups) {
      let schedule = [], members = [];
      try {
        [schedule, members] = await Promise.all([
          API._request('GET', `/api/groups/${g.id}/schedule`),
          API._request('GET', `/api/groups/${g.id}/members`),
        ]);
      } catch {}

      const branch = branches.find(b => b.id === g.branchId);
      const schedStr = schedule.map(s => `${DAYS[s.weekday]} ${s.startTime} (${s.durationMin} мин)`).join(', ') || 'не задано';

      html += `<div class="card" style="padding:20px;margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div>
            <h3 style="margin:0 0 4px">${escapeHtml(g.name)}</h3>
            <div style="color:#64748b;font-size:14px">
              ${branch ? escapeHtml(branch.name) : ''} ·
              <span class="badge ${g.lessonKind==='main'?'':'badge-warning'}">${g.lessonKind==='main'?'Основная':'Доп.'}</span> ·
              <span class="badge ${g.status==='active'?'badge-success':'badge-danger'}">${g.status==='active'?'Активна':'Архив'}</span>
            </div>
            <div style="margin-top:6px;font-size:13px;color:#475569">📅 ${schedStr}</div>
          </div>
          <span style="font-size:13px;color:#64748b">${members.length} учеников</span>
        </div>
        <table class="table" style="margin-top:14px">
          <thead><tr><th>Ученик</th><th>Статус CRM</th><th>Занятий осталось</th><th>Тариф</th></tr></thead>
          <tbody>
            ${members.length ? members.map(m => {
              const crm = clients.find(c => c.userId === m.studentId);
              const tariff = crm ? tariffs.find(t => t.id === crm.tariffId) : null;
              const statusLabel = {active:'Активный',frozen:'Заморожен',inactive:'Неактивный'}[crm?.status] || '—';
              const statusClass = {active:'badge-success',frozen:'badge-warning',inactive:'badge-danger'}[crm?.status] || '';
              const visitsStyle = (crm?.visitsLeft ?? 99) <= 2 ? 'color:#ef4444;font-weight:700' : '';
              return `<tr>
                <td><b>${escapeHtml(m.studentName || m.studentId)}</b></td>
                <td>${crm ? `<span class="badge ${statusClass}">${statusLabel}</span>` : '<span style="color:#94a3b8">нет карточки</span>'}</td>
                <td><span style="${visitsStyle}">${crm ? crm.visitsLeft : '—'}</span></td>
                <td>${tariff ? escapeHtml(tariff.name) : '—'}</td>
              </tr>`;
            }).join('') : '<tr><td colspan="4" style="text-align:center;color:#64748b;padding:16px">Нет учеников</td></tr>'}
          </tbody>
        </table>
      </div>`;
    }
  }

  section.innerHTML = html;
}
</script>
