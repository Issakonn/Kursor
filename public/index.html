<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>КУРСОР — Школа программирования</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="https://salamalekum.sirv.com/_1_1.png.webp"><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Code&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="login-page">
 <div class="login-box">
 <img src="https://salamalekum.sirv.com/_1_1.png.webp" alt="Курсор" class="logo">
 <img class="mascot-lg" src="/uploads/mascot/happy.png" alt="Маскот КУРСОР" style="display:block;margin:0 auto 8px">
 <h1>Привет!</h1>
 <p>Войди и начнём программировать!</p>

 <form id="loginForm">
 <div class="form-group">
 <label>Логин</label>
 <input class="form-input" type="text" id="login" placeholder="твой логин" required autofocus autocomplete="username">
 </div>
 <div class="form-group">
 <label>Пароль</label>
 <input class="form-input" type="password" id="password" placeholder="пароль" required autocomplete="current-password">
 </div>
 <button type="submit" class="btn btn-lg" id="submitBtn" style="width:100%">Войти</button>
 </form>

 <p style="margin-top:18px;font-size:13px;color:#64748b;text-align:center">Нет аккаунта? Попроси администратора создать его для тебя.
 </p>

 <div id="msg" style="margin-top:14px;color:#ef4444;font-weight:700;text-align:center"></div>
 </div>
</div>

<script src="/data/database.js"></script>
<script src="/js/api.js"></script>
<script>
(function () {
 const u = API.getCurrentUser();
 if (u && API.getToken()) redirectByRole(u.role);
})();

function redirectByRole(role) {
 if (role === 'admin') location.href = '/admin/index.html';
 else if (role === 'teacher') location.href = '/pages/teacher.html';
 else location.href = '/pages/dashboard.html';
}

document.getElementById('loginForm').addEventListener('submit', async function (e) {
 e.preventDefault();
 const login = document.getElementById('login').value.trim();
 const password = document.getElementById('password').value;
 const msg = document.getElementById('msg');
 const btn = document.getElementById('submitBtn');
 msg.textContent = '';
 btn.disabled = true; btn.textContent = 'Проверяем...';
 try {
 const user = await API.login(login, password);
 redirectByRole(user.role);
 } catch (err) {
 msg.textContent = err.message || 'Неверный логин или пароль ';
 btn.disabled = false; btn.textContent = 'Войти';
 }
});
</script>
</body>
</html>
